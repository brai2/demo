name: Build and push Docker image

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: event-manager

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.DOCKERHUB_TOKEN }}

      - name: Set image name and tags
        id: vars
        run: |
          echo "IMAGE=${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "TAG_SHA=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.vars.outputs.IMAGE }}:latest
            ${{ steps.vars.outputs.IMAGE }}:${{ steps.vars.outputs.TAG_SHA }}

      - name: Triển khai lên DevOps Classroom
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          set -euo pipefail
          if [ -z "${DEPLOY_URL:-}" ]; then
            echo "Thiếu GitHub Secret DEPLOY_URL (Settings → Secrets → Actions)."
            exit 1
          fi

          REPO="brai27/event-manager"
          TAG="latest"
          SLOT="8"
          CONTAINER_PORT="80"
          MAX_ATTEMPTS=5
          SLEEP_SEC=25
          LAST_BODY=""
          LAST_CODE=""

          # Giống hướng dẫn lớp: POST + query trên URL (không dùng -G vì -G sẽ biến thành GET).
          BASE_URL="${DEPLOY_URL%/}"
          WEBHOOK_URL="${BASE_URL}?repo=${REPO}&tag=${TAG}&slot=${SLOT}&container_port=${CONTAINER_PORT}&strict_container_port=0"

          should_retry() {
            code="$1"
            case "$code" in
              502|503|504|524|429) return 0 ;;
              *) return 1 ;;
            esac
          }

          for attempt in $(seq 1 "$MAX_ATTEMPTS"); do
            echo "Deploy webhook: lần $attempt/$MAX_ATTEMPTS"
            set +e
            RESPONSE=$(curl -sS --max-time 240 -w "\n%{http_code}" -X POST "$WEBHOOK_URL")
            CURL_EXIT=$?
            set -e

            if [ "$CURL_EXIT" -ne 0 ]; then
              echo "curl lỗi (exit $CURL_EXIT). Thường do mạng/timeout phía server."
              if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
                echo "Chờ ${SLEEP_SEC}s rồi thử lại..."
                sleep "$SLEEP_SEC"
              fi
              continue
            fi

            LAST_BODY=$(echo "$RESPONSE" | sed '$d')
            LAST_CODE=$(echo "$RESPONSE" | tail -n1)
            echo "Webhook HTTP: $LAST_CODE"

            if [ "$LAST_CODE" -ge 200 ] && [ "$LAST_CODE" -lt 300 ]; then
              echo "Deploy thành công."
              echo "::group::Chi tiết webhook JSON"
              echo "$LAST_BODY" | python3 -m json.tool 2>/dev/null || echo "$LAST_BODY"
              echo "::endgroup::"
              exit 0
            fi

            if [ "$LAST_CODE" -ge 400 ] && [ "$LAST_CODE" -lt 500 ]; then
              echo "Lỗi phía client (HTTP $LAST_CODE). Không retry."
              break
            fi

            if should_retry "$LAST_CODE" && [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Lỗi tạm (HTTP $LAST_CODE). Chờ ${SLEEP_SEC}s rồi thử lại..."
              sleep "$SLEEP_SEC"
              continue
            fi

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "HTTP $LAST_CODE. Chờ ${SLEEP_SEC}s rồi thử lại..."
              sleep "$SLEEP_SEC"
            fi
          done

          echo "Deploy thất bại sau $MAX_ATTEMPTS lần. Xem chi tiết trong nhóm log bên dưới."
          echo "::group::Chi tiết webhook JSON"
          echo "${LAST_BODY:-}" | python3 -m json.tool 2>/dev/null || echo "${LAST_BODY:-}"
          echo "::endgroup::"
          exit 1
